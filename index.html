<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SurConnect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>SurConnect</h2>
    
    <div class="form-box">
        <h3>Apni Profile Add Karein</h3>
        <form id="artistForm">
            <input type="text" id="name" placeholder="Naam" required>
            <input type="text" id="role" placeholder="Role (e.g., Rapper)" required>
            <input type="text" id="city" placeholder="City" required>
            <textarea id="intro" placeholder="Chhota Intro..."></textarea>
            <input type="number" id="wa" placeholder="WhatsApp Number" required>
            <button type="submit">Publish Profile</button>
        </form>
    </div>

    <h2>Artists List</h2>
    <div id="artistList">Loading profiles...</div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
